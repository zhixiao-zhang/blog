name: Deploy Hugo Blog to AWS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取你的博客主要源码（去掉了 submodules 参数）
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0    

      # 【新增核心步骤】：暴力且极其优雅地直接 Clone 主题库
      - name: Clone Hugo Theme
        run: |
          mkdir -p themes
          git clone https://github.com/zhixiao-zhang/hugo-xmag.git themes/hugo-xmag

      # 2. 配置最新的 Hugo 环境
      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      # 3. 编译生成静态网页
      - name: Build Hugo Site
        run: hugo --minify

      # 4. 通过 SSH 将 public 目录精准覆盖到服务器
      - name: Deploy to AWS via SSH
        uses: easingthemes/ssh-deploy@main
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.HOST }}
          REMOTE_USER: ${{ secrets.USERNAME }}
          TARGET: /var/www/blog/
          SOURCE: "public/"
          ARGS: "-rlgoDzvc -i --delete"